name: Deploy to Lightsail

on:
  push:
    branches: [master]  # Cambia "main" por la rama que uses

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🏗️ Build project (React/Vite)
        run: npm run build

      - name: 🚀 Copy files to Lightsail via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "dist/*"                    # Carpeta que genera Vite
          target: "/var/www/appcalendar/html" # Ruta en tu servidor
          strip_components: 1

      - name: 🔄 Restart Nginx (via SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo systemctl restart nginx
            echo "✅ Deployment completed at $(date)"