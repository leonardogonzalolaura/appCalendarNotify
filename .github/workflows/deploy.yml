name: Deploy to Lightsail

on:
  push:
    branches: [master]  # o la rama que uses

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      # ========== FRONTEND (React) ==========
      - name: 🟢 Setup Node.js for frontend
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: 📦 Install frontend dependencies
        run: npm install

      - name: 🏗️ Build frontend
        run: npm run build
        env:
          VITE_API_URL: https://appcalendar.atechlo.com/api

      - name: 🚀 Deploy frontend to Lightsail
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "dist/*"
          target: "/var/www/appcalendar/html"
          strip_components: 1

      # ========== BACKEND (Node.js) ==========
      - name: 📦 Copy backend files (excluding node_modules)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "server/*"
          target: "/var/www/appcalendar/backend"
          strip_components: 1

      - name: 🔧 Install backend dependencies and restart PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/appcalendar/backend
            npm install
            pm2 restart appcalendar-backend || pm2 start index.js --name appcalendar-backend
            pm2 save
            echo "✅ Deployment completed at $(date)"